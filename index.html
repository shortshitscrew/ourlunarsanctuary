<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescent Moon Animation</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        svg {
            width: 150px;
            height: 150px;
            animation: growMoon 10s infinite;
        }
        @keyframes growMoon {
            0% {
                transform: scale(0.5);
                opacity: 0.5;
            }
            50% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.5);
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <!-- Full circle -->
        <circle cx="50" cy="50" r="40" fill="#fff" />
        <!-- Cutout circle for crescent effect -->
        <circle cx="65" cy="50" r="40" fill="#0a0a0a" />
    </svg>
</body>
</html>
